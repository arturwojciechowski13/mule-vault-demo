resources:
  - name: mule-repo
    type: git
    source:
      uri: ((mule_repo_uri))
      branch: ((mule_repo_branch))

  # Resource typu "time" - zamiast reagowac na zmiane w gicie, odpala sie
  # cyklicznie. Uzywane tu do triggerowania nocnej regresji.
  - name: nightly
    type: time
    source:
      interval: 24h

jobs:
  # --- 1. Testy jednostkowe (MUnit) - pierwsza linia obrony ---
  - name: unit-tests
    plan:
      - get: mule-repo
        trigger: true
      - task: run-unit-tests
        file: mule-repo/ci/tasks/run-unit-tests.yml

  # --- 2. Srodowisko DEV ---
  - name: build-and-deploy-dev
    plan:
      - get: mule-repo
        passed: [unit-tests]
        trigger: true

      # Ten krok idzie do Vault po wartosci pod ((mule-app/dev/db_password))
      # i ((mule-app/dev/api_key)) - Concourse robi to samo, przy kazdym
      # uruchomieniu, bez zapisywania sekretu na stale w definicji pipeline'u.
      - task: replace-placeholders
        file: mule-repo/ci/tasks/replace-placeholders.yml
        params:
          DB_PASSWORD: ((mule-app/dev/db_password))
          API_KEY: ((mule-app/dev/api_key))
          ENVIRONMENT: dev

      - task: build-mule-app
        file: mule-repo/ci/tasks/build-app.yml

      - task: deploy-mule-app
        file: mule-repo/ci/tasks/deploy-app.yml
        params:
          ENVIRONMENT: dev

      - task: run-integration-tests
        file: mule-repo/ci/tasks/run-integration-tests.yml
        params:
          ENVIRONMENT: dev
          APP_URL: http://mule-app-dev.internal:8081

  # --- 3. Srodowisko PROD ---
  # Ten job odpala sie dopiero, gdy "build-and-deploy-dev" przejdzie
  # (passed: [...]) - typowy wzorzec promocji miedzy srodowiskami.
  - name: build-and-deploy-prod
    plan:
      - get: mule-repo
        passed: [build-and-deploy-dev]
        trigger: false

      - task: replace-placeholders
        file: mule-repo/ci/tasks/replace-placeholders.yml
        params:
          DB_PASSWORD: ((mule-app/prod/db_password))
          API_KEY: ((mule-app/prod/api_key))
          ENVIRONMENT: prod

      - task: build-mule-app
        file: mule-repo/ci/tasks/build-app.yml

      - task: deploy-mule-app
        file: mule-repo/ci/tasks/deploy-app.yml
        params:
          ENVIRONMENT: prod

      - task: run-integration-tests
        file: mule-repo/ci/tasks/run-integration-tests.yml
        params:
          ENVIRONMENT: prod
          APP_URL: http://mule-app-prod.internal:8081

  # --- 4. Nocna regresja na prod - trigger inny niz git ---
  - name: nightly-regression-prod
    plan:
      - get: nightly
        trigger: true
      - get: mule-repo
        passed: [build-and-deploy-prod]
      - task: run-regression-tests
        file: mule-repo/ci/tasks/run-regression-tests.yml
        params:
          ENVIRONMENT: prod
          APP_URL: http://mule-app-prod.internal:8081
